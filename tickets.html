<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Half Awake Eyes | Tickets</title>
  <meta name="description" content="Official tickets and live date links for Half Awake Eyes." />
  <link rel="canonical" href="https://halfawakeeyes.co.uk/tickets.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Half Awake Eyes | Tickets" />
  <meta property="og:description" content="Official tickets and live date links for Half Awake Eyes." />
  <meta property="og:url" content="https://halfawakeeyes.co.uk/tickets.html" />
  <meta property="og:image" content="https://halfawakeeyes.co.uk/assets/images/HalfAwakeEyes-annicmrn-07798.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Source+Sans+Pro:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/css/tickets.css?v=20260423-door-price" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <span class="brand">Half Awake Eyes</span>
    </header>

    <main class="ticket-shell">
      <section class="artist-card">
        <div class="artist-image-wrap">
          <img id="ticket-artwork" alt="" decoding="async" fetchpriority="high" hidden />
          <div id="ticket-artwork-fallback" class="artwork-fallback">
            <div class="fallback-brand">Half Awake Eyes</div>
          </div>
        </div>

        <div class="artist-copy">
          <div class="artist-name" id="art-caption-title">Half Awake Eyes</div>
          <p class="artist-note" id="art-caption-note">Official tickets and live dates.</p>
          <a class="eyebrow ticket-badge-link" id="ticket-badge" href="#" aria-label="Open official tickets">Official Tickets</a>
        </div>
      </section>

      <section class="show-card">
        <div class="show-main">
          <h1 id="ticket-title">Preparing Tickets</h1>
          <p class="show-date-line" id="ticket-date-detail">Loading date</p>
          <p class="show-location" id="ticket-venue-detail">Checking venue</p>
          <div class="price-rail" id="ticket-price-rail" hidden>
            <span class="price-chip is-primary" id="ticket-price-chip" hidden>Advance</span>
            <span class="price-chip" id="ticket-door-price-chip" hidden>Door</span>
          </div>
          <p class="subtitle" id="ticket-subtitle">Official tickets</p>
          <p class="description" id="ticket-description" hidden></p>
        </div>

        <div class="show-actions">
          <a id="ticket-continue" class="cta-button primary" href="#" hidden>Tickets</a>
          <p class="trust-copy" id="ticket-trust-copy" hidden>Official artist ticket link.</p>
        </div>
      </section>

      <div class="progress-shell" aria-hidden="true" hidden>
        <span class="progress-track">
          <span class="progress-fill" id="ticket-progress-fill"></span>
        </span>
      </div>

      <p class="note" id="ticket-note" hidden></p>
      <div class="footer-links">
        <span>&copy; <span data-current-year></span> Half Awake Eyes</span>
        <a class="top-link" href="privacy.html">Privacy</a>
      </div>
      <span id="art-overlay-chip" hidden>Ticket Redirect</span>
    </main>
  </div>

  <div class="sticky-cta-shell" id="sticky-cta-shell" hidden>
    <a id="ticket-continue-sticky" class="cta-button primary sticky-cta-button" href="#" hidden>Get Tickets</a>
  </div>

  <script src="assets/js/current-year.js"></script>
  <script type="module" src="assets/js/tickets.js?v=20260423-door-price"></script>
</body>
</html>
