<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Half Awake Eyes | Links</title>
    <meta name="description" content="Official links for Half Awake Eyes." />
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="assets/css/links.css" />
</head>

<body>
    <main class="page">
        <section class="profile-shell">
            <div class="profile-top">
                <div class="avatar">
                    <img src="assets/images/HalfAwakeEyes-annicmrn-07798.jpg" alt="Half Awake Eyes band photo">
                </div>
                <div>
                    <h1 class="title">Half Awake Eyes</h1>
                    <p class="subtitle">Alternative Metal | Glasgow, Scotland</p>
                </div>
                <br />
                <div class="social-row" id="social-links"></div>
            </div>

            <div class="link-stack" id="main-links"></div>

            <section class="signup-shell" aria-labelledby="signup-title">
                <div class="signup-copy">
                    <h2 id="signup-title" class="signup-title">Email Updates</h2>
                    <p class="signup-description">Gig drops + release updates.</p>
                </div>
                <form id="email-signup-form" class="signup-form">
                    <div class="signup-form-row">
                        <input type="email" id="email-signup-input" class="signup-input" placeholder="you@example.com" autocomplete="email" required />
                        <button type="submit" id="email-signup-submit" class="signup-submit">Join</button>
                    </div>
                    <div id="email-signup-status" class="signup-status" aria-live="polite"></div>
                </form>
            </section>

            <div class="footer">
                <a href="privacy.html" data-link-label="Privacy policy">Privacy Policy</a>
            </div>
        </section>
    </main>


  <script type="module" src="assets/js/links.js"></script>
</body>

</html>
